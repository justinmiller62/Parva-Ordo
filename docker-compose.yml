services:
  db:
    image: postgres:17
    container_name: parvaordo_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: parvaordo
    ports:
      - "5432:5432"
    volumes:
      - parvaordo_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d parvaordo"]
      interval: 5s
      timeout: 5s
      retries: 12

volumes:
  parvaordo_pgdata:
